<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reforged Deck Builder</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

  <header>
    <h1>Reforged Deck Builder</h1>
  
    <div class="controls">
      <input type="text" id="searchBox" placeholder="Search name or card text...">
  
      <select id="setFilter">
        <option value="">All Sets</option>
      </select>
  
      <select id="factionFilter">
        <option value="">All Factions</option>
      </select>
  
      <select id="subtypeFilter">
        <option value="">All Subtypes</option>
      </select>
  
      <select id="damageTypeFilter">
        <option value="">All Damage Types</option>
      </select>
  
      <select id="costFilter">
        <option value="">All Costs</option>
      </select>
  
      <button id="clearFiltersButton" type="button">Clear Filters</button>
    </div>
  </header>

<main>
  <section>
    <div id="cardGrid" class="card-grid"></div>
  </section>

  <aside class="preview-panel">
    <h2>Preview</h2>
  
    <img id="cardPreview" src="" alt="Card Preview">
  
    <div id="previewName">Hover over a card</div>
    <div id="previewDetails"></div>
    <div id="previewText"></div>
  </aside>
  
  <aside class="deck-panel">
    <h2>Deck</h2>
  
    <div id="deckList"></div>
  
    <p>
      <strong>Total Cards:</strong>
      <span id="deckCount">0</span>
    </p>
  
    <textarea id="deckExport" readonly></textarea>
  </aside>
</main>

<script src="js/state.js?v=1"></script>
<script src="js/preview.js?v=1"></script>
<script src="js/deck.js?v=1"></script>
<script src="js/filters.js?v=1"></script>
<script src="js/cards.js?v=1"></script>
<script src="js/app.js?v=1"></script>

</body>
</html>
