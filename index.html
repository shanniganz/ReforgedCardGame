<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reforged Deck Builder</title>
  <link rel="stylesheet" href="style.css?v=17">
</head>
<body>

  <header>
    <h1>Reforged Deck Builder</h1>
    <a class="rules-link" href="Reforged%20Rules%20Doc.pdf" target="_blank" rel="noopener">Rules PDF</a>
  
    <div class="controls">
      <input type="text" id="searchBox" placeholder="Search name or card text...">
  
      <div id="setFilter" class="multi-select-filter">
        <button id="setFilterButton" class="multi-select-button" type="button" aria-expanded="false">
          All Sets
        </button>
        <div id="setFilterOptions" class="multi-select-options"></div>
      </div>
  
      <div id="factionFilter" class="multi-select-filter">
        <button id="factionFilterButton" class="multi-select-button" type="button" aria-expanded="false">
          All Factions
        </button>
        <div id="factionFilterOptions" class="multi-select-options"></div>
      </div>
  
      <div id="subtypeFilter" class="multi-select-filter">
        <button id="subtypeFilterButton" class="multi-select-button" type="button" aria-expanded="false">
          All Subtypes
        </button>
        <div id="subtypeFilterOptions" class="multi-select-options"></div>
      </div>
  
      <div id="damageTypeFilter" class="multi-select-filter">
        <button id="damageTypeFilterButton" class="multi-select-button" type="button" aria-expanded="false">
          All Damage Types
        </button>
        <div id="damageTypeFilterOptions" class="multi-select-options"></div>
      </div>

      <div id="legendaryFilter" class="multi-select-filter">
        <button id="legendaryFilterButton" class="multi-select-button" type="button" aria-expanded="false">
          All Legendary
        </button>
        <div id="legendaryFilterOptions" class="multi-select-options"></div>
      </div>
  
      <div id="costFilter" class="multi-select-filter">
        <button id="costFilterButton" class="multi-select-button" type="button" aria-expanded="false">
          All Costs
        </button>
        <div id="costFilterOptions" class="multi-select-options"></div>
      </div>
  
      <button id="clearFiltersButton" type="button">Clear Filters</button>
    </div>
  </header>

<main>
  <section>
    <div id="cardGrid" class="card-grid"></div>
  </section>

  <aside class="preview-panel">
    <h2>Preview</h2>
  
    <img id="cardPreview" src="" alt="Card Preview">
  
    <div id="previewName">Hover over a card</div>
    <div id="previewDetails"></div>
    <div id="previewText"></div>
  </aside>
  
  <aside class="deck-panel">
    <h2>Deck</h2>

    <div id="deckIdentity" class="deck-identity" aria-live="polite"></div>

    <div id="deckMessage" class="deck-message" aria-live="polite"></div>

    <div class="deck-tabs" role="tablist" aria-label="Deck views">
      <button id="deckListTab" class="deck-tab active" type="button" role="tab" aria-selected="true" aria-controls="deckListPanel">List</button>
      <button id="deckSummaryTab" class="deck-tab" type="button" role="tab" aria-selected="false" aria-controls="deckSummaryPanel">Export</button>
    </div>
  
    <div id="deckListPanel" class="deck-tab-panel active" role="tabpanel" aria-labelledby="deckListTab">
      <div id="deckList"></div>
    
      <p>
        <strong>Total Cards:</strong>
        <span id="deckCount">0</span>
      </p>

      <button id="clearDeckButton" class="deck-action-button" type="button">Clear Deck</button>
    </div>

    <div id="deckSummaryPanel" class="deck-tab-panel" role="tabpanel" aria-labelledby="deckSummaryTab">
      <div id="deckSummary" class="deck-summary"></div>



      <button id="copyDeckButton" class="deck-action-button" type="button">Copy Deck Text</button>
      

      <textarea id="deckExport" readonly></textarea>
      <fieldset class="anvil-options">
        <legend>Anvil</legend>
        <label>
          <input type="radio" name="anvilOption" value="order">
          Order
        </label>
        <label>
          <input type="radio" name="anvilOption" value="chaos">
          Chaos
        </label>
        <label>
          <input type="radio" name="anvilOption" value="none" checked>
          None
        </label>
      </fieldset>

      <button id="cardPdfButton" class="deck-action-button" type="button">Card PDF</button>
      
      <div class="deck-code-tools">
        <textarea id="deckCode" placeholder="Paste deck code here"></textarea>
        <button id="copyDeckCodeButton" class="deck-action-button" type="button">Copy Deck Code</button>
        <button id="importDeckCodeButton" class="deck-action-button" type="button">Import Deck Code</button>
      </div>
    </div>
  </aside>
</main>

<script src="js/state.js?v=10"></script>
<script src="js/preview.js?v=2"></script>
<script src="js/deckSummary.js?v=3"></script>
<script src="js/deck.js?v=17"></script>
<script src="js/filters.js?v=6"></script>
<script src="js/cards.js?v=5"></script>
<script src="js/app.js?v=8"></script>

</body>
</html>
