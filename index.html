<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reforged Deck Builder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Reforged Deck Builder</h1>
    </header>

    <main>

        <section>

            <div class="controls">

                <input
                    type="text"
                    id="searchBox"
                    placeholder="Search cards...">

                <select id="factionFilter">
                    <option value="">All Factions</option>
                </select>

                <select id="typeFilter">
                    <option value="">All Types</option>
                </select>

            </div>

            <div
                id="cardGrid"
                class="card-grid">
            </div>

        </section>

        <aside class="deck-panel">

            <h2>Deck</h2>
            
            <div class="preview-panel">
              <img id="cardPreview" src="" alt="Card Preview">
              <div id="previewName">Hover over a card</div>
            </div>
            
            <div id="deckList"></div>

            <hr>

            <strong>Total Cards:</strong>
            <span id="deckCount">0</span>

            <textarea
                id="deckExport"
                readonly></textarea>

        </aside>

    </main>

    <script src="app.js"></script>

</body>

</html>
